name: Post Semanal de Tecnologia

on:
  schedule:
    # Toda sexta-feira às 08:00 (horário de Brasília = 11:00 UTC)
    - cron: '0 11 * * 5'

  # Permite rodar manualmente pelo GitHub para testar
  workflow_dispatch:

jobs:
  gerar-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write # precisa para fazer commit

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Rodar script de geração de post
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/generate_post.py

      - name: Commit e push dos novos posts
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/post/
          # Só commita se houver arquivos novos
          git diff --cached --quiet || git commit -m "feat(post): post automático de tecnologia $(date +'%Y-%m-%d')"
          git push
